<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareWell - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F8FAFC;
      --surface: #FFFFFF;
      --primary: #0B4F8C;
      --green: #6CBF43;
      --error: #EF4444;
      --text: #0F172A;
      --muted: #64748B;
      --border: #E7EDF5;
      --radius: 26px;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    button, input { font: inherit; }
    button { cursor: pointer; }

    .login-container {
      width: 100%;
      max-width: 480px;
      animation: fadeIn 0.5s ease both;
    }

    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      padding: 36px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      position: relative;
    }

    .back-btn {
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 16px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 4px;
      transition: transform 200ms ease, color 200ms ease;
    }
    .back-btn:hover {
      transform: translateX(-3px);
      color: var(--primary);
    }

    .logo-header {
      text-align: center;
      margin-bottom: 8px;
    }
    .logo-header img {
      width: 160px;
      height: auto;
      margin: 0 auto;
    }

    .intro-text {
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .intro-text h1 {
      margin: 0;
      font-family: Poppins, sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: #0B1F44;
      line-height: 1.2;
    }
    .intro-text p {
      margin: 0;
      font-size: 16px;
      color: var(--muted);
      line-height: 1.5;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    label {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .input-field {
      width: 100%;
      height: 56px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: #FFFFFF;
      color: var(--text);
      transition: border-color 200ms ease, box-shadow 200ms ease;
    }
    .input-field:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(11, 79, 140, 0.08);
    }
    .input-field.error {
      border-color: var(--error);
      box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.08);
    }

    .error-text {
      color: var(--error);
      font-size: 13px;
      font-weight: 500;
      display: none;
      margin-top: 2px;
    }

    .primary-btn {
      width: 100%;
      height: 64px;
      border-radius: 20px;
      border: 0;
      background: var(--primary);
      color: #FFFFFF;
      font-family: Poppins, sans-serif;
      font-size: 18px;
      font-weight: 700;
      box-shadow: 0 12px 28px rgba(11, 79, 140, 0.22);
      transition: transform 200ms ease, background-color 200ms ease, box-shadow 200ms ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-top: 8px;
    }
    .primary-btn:hover {
      background: #084072;
      transform: translateY(-2px);
      box-shadow: 0 14px 32px rgba(11, 79, 140, 0.3);
    }

    .security-note {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 12px;
      padding: 0 8px;
    }
    .security-note svg {
      width: 20px;
      height: 20px;
      color: var(--primary);
      flex-shrink: 0;
    }
    .security-note p {
      margin: 0;
      font-size: 14px;
      line-height: 1.4;
      color: var(--muted);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 420px) {
      .card {
        padding: 24px 20px;
        border-radius: 20px;
      }
      .intro-text h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>

  <main class="login-container">
    <div class="card">
      
      <!-- Back Arrow Link -->
      <div>
        <button class="back-btn" id="backBtn" type="button">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
          Back
        </button>
      </div>

      <!-- CareWell Logo -->
      <div class="logo-header">
        <img src="main_logo.jpg" alt="CareWell Logo" />
      </div>

      <!-- Welcome Text -->
      <div class="intro-text">
        <h1>Login to CareWell</h1>
        <p>Access your account securely with email/phone & password.</p>
      </div>

      <!-- Input Form -->
      <form id="loginForm" style="display: flex; flex-direction: column; gap: 20px; margin-top: 12px;" novalidate>
        
        <!-- Identifier field -->
        <div class="form-group">
          <label for="identifier">Email or Phone Number</label>
          <input class="input-field" id="identifier" type="text" placeholder="Email address or mobile number" required />
          <span class="error-text" id="identifierError">Please enter a valid email or phone number.</span>
        </div>

        <!-- Password field -->
        <div class="form-group">
          <label for="password">Password</label>
          <input class="input-field" id="password" type="password" placeholder="Enter your password" required />
          <span class="error-text" id="passwordError">Password must be at least 6 characters.</span>
        </div>

        <!-- Login Button -->
        <button class="primary-btn" type="submit">Log In</button>

      </form>

      <!-- Security Statement -->
      <footer class="security-note">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        </svg>
        <p>Your credentials are encrypted securely.</p>
      </footer>

    </div>
  </main>

  <script>
    const backBtn = document.getElementById('backBtn');
    const loginForm = document.getElementById('loginForm');
    const identifier = document.getElementById('identifier');
    const password = document.getElementById('password');
    const identifierError = document.getElementById('identifierError');
    const passwordError = document.getElementById('passwordError');

    // Back to auth gateway screen
    backBtn.addEventListener('click', () => {
      window.location.href = 'onboarding-screen-7.html';
    });

    // Sanitization & simple XSS escaping helper
    function sanitizeInput(str) {
      return str.replace(/[&<>"']/g, function(m) {
        switch (m) {
          case '&': return '&amp;';
          case '<': return '&lt;';
          case '>': return '&gt;';
          case '"': return '&quot;';
          case "'": return '&#039;';
        }
      });
    }

    // Email pattern check
    function isValidEmail(email) {
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return emailRegex.test(email);
    }

    // Phone pattern check (simple numeric check, 7-15 digits)
    function isValidPhone(phone) {
      const phoneRegex = /^\+?[0-9]{7,15}$/;
      return phoneRegex.test(phone.replace(/[\s-()]/g, ''));
    }

    // Form submission validation
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      
      let isValid = true;

      // Clean indicators
      identifier.classList.remove('error');
      password.classList.remove('error');
      identifierError.style.display = 'none';
      passwordError.style.display = 'none';

      const idVal = identifier.value.trim();
      const pwVal = password.value;

      // Validate Identifier (must be email or phone)
      if (!isValidEmail(idVal) && !isValidPhone(idVal)) {
        identifier.classList.add('error');
        identifierError.style.display = 'block';
        isValid = false;
      }

      // Validate Password length (minimum 6 chars)
      if (pwVal.length < 6) {
        password.classList.add('error');
        passwordError.style.display = 'block';
        isValid = false;
      }

      if (!isValid) return;

      // Escape inputs for XSS safety
      const cleanIdentifier = sanitizeInput(idVal);

      // Perform Mock Authentication
      const mockToken = 'mock_jwt_token_' + Math.random().toString(36).substring(2, 15);
      sessionStorage.setItem('jwtToken', mockToken);
      sessionStorage.setItem('userProfile', JSON.stringify({ identifier: cleanIdentifier, method: 'credentials' }));

      alert('Logged in successfully!');
      window.location.href = 'registration.html';
    });
  </script>
</body>
</html>
