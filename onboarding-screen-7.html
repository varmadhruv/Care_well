<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data: https://accounts.google.com https://www.googleapis.com; script-src 'self' 'unsafe-inline' https://accounts.google.com; connect-src 'self' https://care-well-1.onrender.com http://localhost:3000 http://127.0.0.1:3000 https://accounts.google.com https://www.googleapis.com; base-uri 'self'; frame-ancestors 'none';" />
  <title>CareWell - Authentication Gateway</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8fafc;
      --primary: #0b4f8c;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e5e7eb;
      --soft-line: #e7edf5;
      --shadow-blue: 0 12px 28px rgba(11, 79, 140, 0.25);
      --shadow-soft: 0 6px 20px rgba(15, 23, 42, 0.05);
      --ease: 250ms ease;
    }

    * { box-sizing: border-box; }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    button,
    a {
      font: inherit;
    }

    .page {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      padding: 32px 24px;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at 50% 8%, rgba(255, 255, 255, 0.92), rgba(248, 250, 252, 0) 34%),
        #f8fafc;
      overflow-x: hidden;
    }

    .gateway {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      animation: pageIn 500ms ease both;
    }

    .brand {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      width: 100%;
    }

    .brand-logo {
      width: clamp(108px, 14vw, 134px);
      max-width: 30vw;
      height: auto;
      display: block;
      object-fit: contain;
      flex: 0 0 auto;
    }

    .brand-copy {
      display: grid;
      gap: 6px;
      align-content: center;
      text-align: left;
      min-width: 0;
    }

    .brand-title {
      margin: 0;
      font-family: Poppins, Inter, sans-serif;
      font-size: clamp(32px, 4.4vw, 44px);
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--primary);
      white-space: nowrap;
    }

    .brand-subtitle {
      margin: 0;
      font-family: Poppins, Inter, sans-serif;
      font-size: clamp(14px, 1.7vw, 18px);
      line-height: 1;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: #6cbf43;
    }

    .hero {
      position: relative;
      width: min(100%, clamp(320px, 40vw, 420px));
      display: grid;
      place-items: center;
      overflow: hidden;
      border-radius: 26px;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto 0 0;
      height: 34%;
      background: linear-gradient(180deg, rgba(248, 250, 252, 0), #f8fafc 88%);
      pointer-events: none;
    }

    .hero img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: cover;
    }

    .welcome {
      display: grid;
      justify-items: center;
      gap: 10px;
      text-align: center;
      width: 100%;
      margin-top: -2px;
    }

    .welcome h1 {
      margin: 0;
      font-family: Poppins, Inter, sans-serif;
      font-size: 48px;
      line-height: 1.1;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--text);
    }

    .welcome p {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.6;
      font-weight: 400;
      color: var(--muted);
    }

    .actions {
      width: 100%;
      display: grid;
      gap: 16px;
      margin-top: 8px;
    }

    .auth-btn {
      position: relative;
      width: 100%;
      height: 64px;
      padding: 0;
      appearance: none;
      border-radius: 20px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      box-shadow: var(--shadow-soft);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      text-decoration: none;
      font-family: Poppins, Inter, sans-serif;
      font-size: 21px;
      font-weight: 600;
      transition: transform var(--ease), box-shadow var(--ease), background var(--ease), border-color var(--ease);
      -webkit-tap-highlight-color: transparent;
    }

    .auth-btn.primary {
      border-color: var(--primary);
      background: var(--primary);
      color: #fff;
      box-shadow: var(--shadow-blue);
      font-size: 21px;
    }

    .auth-btn:hover,
    .auth-btn:focus-visible {
      transform: translateY(-2px) scale(1.02);
      outline: none;
    }

    .auth-btn.primary:hover,
    .auth-btn.primary:focus-visible {
      background: #084476;
      box-shadow: 0 16px 34px rgba(11, 79, 140, 0.28);
    }

    .auth-btn:active {
      transform: scale(0.98);
    }

    .auth-btn[aria-disabled="true"] {
      cursor: default;
    }

    .icon-circle {
      position: absolute;
      left: 14px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #fff;
      display: grid;
      place-items: center;
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(226, 232, 240, 0.72);
      flex: 0 0 auto;
    }

    .auth-btn:not(.primary) .icon-circle {
      background: #ffffff;
    }

    .icon-circle img {
      width: 82%;
      height: 82%;
      object-fit: contain;
      display: block;
      border-radius: 0;
    }

    .another-google-btn .icon-circle img {
      width: 84%;
      height: 84%;
      object-fit: contain;
      background: transparent;
    }

    .phone-icon img {
      width: 80%;
      height: 80%;
    }

    .apple-icon img {
      width: 166%;
      height: 166%;
      transform: translateY(-9px);
    }

    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
      color: #94a3b8;
      font-size: 15px;
      font-weight: 500;
      letter-spacing: 0.02em;
      margin: 2px 0;
    }

    .divider::before,
    .divider::after {
      content: "";
      height: 1px;
      background: var(--line);
      flex: 1;
    }

    .login-block {
      display: grid;
      justify-items: center;
      gap: 8px;
      text-align: center;
      width: 100%;
    }

    .login-block p {
      margin: 0;
      font-size: 18px;
      line-height: 1.5;
      color: var(--muted);
    }

    .login-link {
      color: var(--primary);
      font-family: Poppins, Inter, sans-serif;
      font-size: 24px;
      line-height: 1.2;
      font-weight: 700;
      text-decoration: none;
      transition: text-decoration-color var(--ease), transform var(--ease);
    }

    .login-link:hover,
    .login-link:focus-visible {
      text-decoration: underline;
      outline: none;
    }

    .security {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      width: 100%;
      margin-top: 4px;
      text-align: left;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.45;
    }

    .shield-circle {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #eef4ff;
      display: grid;
      place-items: center;
      overflow: hidden;
      flex: 0 0 auto;
    }

    .shield-circle img {
      width: 28px;
      height: 28px;
      object-fit: contain;
      display: block;
      border-radius: 0;
    }

    @keyframes pageIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 420px) {
      .page { padding: 22px 16px 24px; align-items: flex-start; }
      .gateway { gap: 18px; }
      .brand { gap: 14px; }
      .brand-logo { width: 100px; max-width: 28vw; }
      .brand-title { font-size: 32px; }
      .brand-subtitle { font-size: 14px; letter-spacing: 0.14em; }
      .hero { width: min(86vw, 280px); }
      .welcome h1 { font-size: 40px; }
      .welcome p { font-size: 17px; margin-bottom: 2px; }
      .actions { gap: 12px; margin-top: 2px; }
      .auth-btn { height: 58px; border-radius: 18px; font-size: 18px; }
      .auth-btn.primary { font-size: 18px; }
      .icon-circle { left: 10px; width: 40px; height: 40px; }
      .divider { gap: 12px; margin: 0; }
      .login-block p { font-size: 16px; }
      .login-link { font-size: 22px; }
      .security { font-size: 14px; line-height: 1.35; gap: 10px; }
      .shield-circle { width: 46px; height: 46px; }
    }

    @media (min-width: 768px) {
      .page { padding: 40px 24px; }
      .gateway { max-width: 540px; gap: 26px; }
      .brand { gap: 18px; }
      .hero { width: min(100%, 390px); }
      .welcome h1 { font-size: 50px; }
      .welcome p { font-size: 20px; }
      .actions { gap: 16px; }
      .auth-btn { height: 64px; font-size: 21px; }
    }

    @media (min-width: 1100px) {
      .gateway { max-width: 580px; }
      .brand-logo { width: 128px; }
      .brand-title { font-size: 44px; }
      .brand-subtitle { font-size: 18px; }
      .hero { width: 440px; }
      .welcome h1 { font-size: 52px; }
      .auth-btn { height: 66px; font-size: 21px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* Premium OTP UI Styles */
    .otp-modal {
      background: #0b0b0d !important;
      color: #fff !important;
      border: 1px solid rgba(255, 255, 255, 0.08) !important;
      padding: 36px 24px 32px !important;
      align-items: center !important;
      width: 340px !important;
    }
    @media(min-width: 768px) { .otp-modal { width: 400px !important; padding: 40px 32px 36px !important; } }
    @media(min-width: 1024px) { .otp-modal { width: 430px !important; } }

    .otp-header { text-align: center; margin-bottom: 36px; width: 100%; }
    .otp-title { font-family: Poppins, sans-serif; font-size: 28px; font-weight: 700; margin: 0; line-height: 1.1; }
    .otp-v2 { color: #ff9d00; display: block; margin-top: 4px; font-size: 24px; }
    .otp-subtitle { color: #94a3b8; font-size: 15px; margin: 12px 0 0; }

    .otp-inputs-wrapper { 
      position: relative; 
      display: flex; 
      justify-content: center; 
      margin-bottom: 36px; 
      --box-w: 52px;
      --gap: 12px;
      height: var(--box-w);
      width: 100%;
    }
    @media(min-width: 768px) { .otp-inputs-wrapper { --box-w: 58px; } }

    .otp-inputs { display: flex; gap: var(--gap); position: absolute; }
    
    .otp-box {
      width: var(--box-w); 
      height: var(--box-w);
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 14px;
      color: #fff;
      font-size: 24px;
      font-weight: 600;
      text-align: center;
      outline: none;
      font-family: Inter, sans-serif;
      transition: all 200ms cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.2);
      padding: 0;
    }

    .otp-box:focus {
      border-color: #ff9d00;
      background: rgba(255, 157, 0, 0.05);
      transform: scale(1.08);
    }
    .otp-box.pop {
      animation: popAnim 200ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes popAnim {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); border-color: #ff9d00; }
      100% { transform: scale(1); border-color: rgba(255, 255, 255, 0.08); }
    }

    /* Collapse Animation */
    .otp-inputs.collapsing .otp-box {
      transition: all 500ms cubic-bezier(0.34, 1.56, 0.64, 1);
      opacity: 0;
    }
    .otp-inputs.collapsing .otp-box:nth-child(1) { transform: translateX(calc(1.5 * (var(--box-w) + var(--gap)))) scale(1); opacity: 1; }
    .otp-inputs.collapsing .otp-box:nth-child(2) { transform: translateX(calc(0.5 * (var(--box-w) + var(--gap)))) scale(0.5); }
    .otp-inputs.collapsing .otp-box:nth-child(3) { transform: translateX(calc(-0.5 * (var(--box-w) + var(--gap)))) scale(0.5); }
    .otp-inputs.collapsing .otp-box:nth-child(4) { transform: translateX(calc(-1.5 * (var(--box-w) + var(--gap)))) scale(0.5); }

    /* Success Animation */
    .otp-inputs.success .otp-box:first-child {
      border-color: #10b981;
      background: rgba(16, 185, 129, 0.15);
      box-shadow: 0 0 24px rgba(16, 185, 129, 0.4);
      color: transparent;
      animation: pulseSuccess 600ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes pulseSuccess {
      0% { transform: translateX(calc(1.5 * (var(--box-w) + var(--gap)))) scale(0.8); }
      50% { transform: translateX(calc(1.5 * (var(--box-w) + var(--gap)))) scale(1.15); }
      100% { transform: translateX(calc(1.5 * (var(--box-w) + var(--gap)))) scale(1); }
    }

    .otp-check-icon {
      position: absolute;
      width: 28px;
      height: 28px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      pointer-events: none;
      opacity: 0;
    }
    .otp-inputs.success ~ .otp-check-icon {
      opacity: 1;
    }
    .otp-inputs.success ~ .otp-check-icon polyline {
      stroke-dasharray: 40;
      stroke-dashoffset: 40;
      animation: drawCheck 400ms 200ms ease forwards;
    }
    @keyframes drawCheck { to { stroke-dashoffset: 0; } }

    /* Failure Animation */
    .otp-inputs.failure { animation: shake 400ms ease-in-out; }
    .otp-inputs.failure .otp-box { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); color: #ef4444; }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }

    .otp-verify-btn {
      width: 100%;
      background: #ff9d00;
      color: #000;
      border: none;
      padding: 16px;
      border-radius: 14px;
      font-family: Poppins, sans-serif;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .otp-verify-btn:disabled { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.3); cursor: not-allowed; }
    .otp-verify-btn:not(:disabled):hover { background: #ffaa22; transform: translateY(-2px); }

    .otp-resend { margin-top: 24px; color: #64748b; font-size: 14px; text-align: center; }
    .otp-resend button { background: none; border: none; color: #ff9d00; font-weight: 600; cursor: pointer; padding: 0; margin-left: 4px; font: inherit; }
    .otp-resend button:hover { text-decoration: underline; }
    .otp-resend button:disabled { color: #475569; cursor: default; text-decoration: none; }
  </style>
</head>
<body>
  <main class="page">
    <section class="gateway" aria-label="CareWell login and signup gateway">
      <div class="brand">
        <img class="brand-logo" src="screen7-logo-clean.png" alt="CareWell Nursing Care" />
        <div class="brand-copy" aria-label="CareWell brand">
          <p class="brand-title">CAREWELL</p>
          <p class="brand-subtitle">NURSING CARE</p>
        </div>
      </div>

      <div class="hero" aria-hidden="true">
        <img src="screen7-hero-clean.png" alt="" loading="lazy" />
      </div>

      <div class="welcome">
        <h1>Welcome Back!</h1>
        <p>Sign in to continue your care journey.</p>
      </div>

      <div class="actions" aria-label="Authentication options">
        <a class="auth-btn primary" href="phone-auth.html" aria-label="Continue with Phone Number">
          <span class="icon-circle phone-icon"><img src="screen7-phone-clean.png" alt="" /></span>
          <span>Continue with Phone Number</span>
        </a>

        <a class="auth-btn" href="google-auth.html" aria-label="Continue with Google">
          <span class="icon-circle"><img src="screen7-google-icon.svg" alt="" /></span>
          <span>Continue with Google</span>
        </a>

        <button class="auth-btn secondary-action another-google-btn" type="button" aria-label="Continue other account">
          <span class="icon-circle"><img src="gmail_img.png" alt="" /></span>
          <span>Continue other account</span>
        </button>

        <a class="auth-btn apple-btn" href="#" aria-disabled="true" onclick="return false;" aria-label="Continue with Apple" hidden>
          <span class="icon-circle apple-icon"><img src="screen7-apple-clean.png" alt="" /></span>
          <span>Continue with Apple</span>
        </a>
      </div>

      <div class="divider" aria-hidden="true">OR</div>

      <div class="login-block">
        <p>Already have an account?</p>
        <a class="login-link" href="#" aria-disabled="true" onclick="return false;">Log In</a>
      </div>

      <div class="security" aria-label="Security and privacy notice">
        <span class="shield-circle"><img src="shield-icon.svg" alt="" /></span>
        <span>Your information is secure with us.<br />We respect your privacy.</span>
      </div>
    </section>
  </main>

  <script src="google-oauth.js" defer></script>
  <script>
    window.addEventListener('DOMContentLoaded', () => {
      const appleButton = document.querySelector('.apple-btn');
      const anotherGoogleButton = document.querySelector('.another-google-btn');
      const googleButton = document.querySelector('.auth-btn[href="google-auth.html"]');
      const platform = navigator.userAgentData?.platform || navigator.platform || '';
      const userAgent = navigator.userAgent || '';
      const isAppleDevice = /Mac|iPhone|iPad|iPod/i.test(platform) || /iPhone|iPad|iPod|Macintosh/i.test(userAgent);
      
      const ensureToastHost = () => {
        let host = document.getElementById('carewell-toast-host');
        if (!host) {
          host = document.createElement('div');
          host.id = 'carewell-toast-host';
          host.style.position = 'fixed';
          host.style.inset = '0';
          host.style.width = '100vw';
          host.style.height = '100vh';
          host.style.background = 'rgba(15, 23, 42, 0.6)';
          host.style.backdropFilter = 'blur(6px)';
          host.style.zIndex = '9999';
          host.style.display = 'flex';
          host.style.justifyContent = 'center';
          host.style.alignItems = 'center';
          host.style.padding = '20px';
          document.body.appendChild(host);
        }
        return host;
      };

      const clearHost = (host) => {
        while (host.firstChild) {
          host.removeChild(host.firstChild);
        }
      };

      const showAppleSnackbar = () => {
        const host = ensureToastHost();
        clearHost(host);
        host.style.pointerEvents = 'auto';

        const snackbar = document.createElement('div');
        snackbar.style.background = '#ffffff';
        snackbar.style.color = '#0f172a';
        snackbar.style.padding = '40px';
        snackbar.style.borderRadius = '24px';
        snackbar.style.boxShadow = '0 24px 60px rgba(15, 23, 42, 0.2)';
        snackbar.style.border = '1px solid #e5e7eb';
        snackbar.style.font = '500 20px Inter, system-ui, sans-serif';
        snackbar.style.width = 'min(96vw, 600px)';
        snackbar.style.maxWidth = '100%';
        snackbar.style.display = 'flex';
        snackbar.style.flexDirection = 'column';
        snackbar.style.gap = '28px';
        snackbar.style.opacity = '0';
        snackbar.style.transform = 'scale(0.95) translateY(16px)';
        snackbar.style.transition = 'all 300ms cubic-bezier(0.34, 1.56, 0.64, 1)';

        const msg = document.createElement('div');
        msg.innerHTML = ' <strong>Apple Sign-In is brewing!</strong><br/><br/>We are crafting a beautiful and seamless experience for you. It will be ready very soon!';
        msg.style.lineHeight = '1.6';
        msg.style.fontSize = '22px';
        msg.style.textAlign = 'center';

        const btn = document.createElement('button');
        btn.textContent = 'I Understand';
        btn.style.background = '#0b4f8c';
        btn.style.color = '#fff';
        btn.style.border = 'none';
        btn.style.padding = '18px';
        btn.style.borderRadius = '14px';
        btn.style.font = '600 20px Poppins, sans-serif';
        btn.style.cursor = 'pointer';
        btn.style.transition = 'background 0.2s';
        btn.onmouseover = () => btn.style.background = '#084476';
        btn.onmouseout = () => btn.style.background = '#0b4f8c';
        
        btn.onclick = () => {
          snackbar.style.opacity = '0';
          snackbar.style.transform = 'scale(0.95) translateY(16px)';
          setTimeout(() => {
             snackbar.remove();
             host.remove();
          }, 250);
        };

        snackbar.appendChild(msg);
        snackbar.appendChild(btn);
        host.appendChild(snackbar);

        requestAnimationFrame(() => {
          snackbar.style.opacity = '1';
          snackbar.style.transform = 'scale(1) translateY(0)';
        });
      };

      function showOtherAccountSnackbar() {
        const host = ensureToastHost();
        clearHost(host);
        
        const API_BASE = (window.location.hostname === '127.0.0.1' || window.location.hostname === 'localhost' || window.location.protocol === 'file:') 
          ? 'http://localhost:3000' 
          : 'https://care-well-1.onrender.com';

        const safeFetchJson = async (url, options) => {
          const res = await fetch(API_BASE + url, options);
          const text = await res.text();
          let data = {};
          try { data = JSON.parse(text); } catch(e) { console.error('Non-JSON response:', text); }
          if (!res.ok) throw new Error(data.message || 'Server error. Please try again.');
          return data;
        };

        host.style.pointerEvents = 'auto';

        const snackbar = document.createElement('div');
        snackbar.style.background = '#ffffff';
        snackbar.style.color = '#0f172a';
        snackbar.style.padding = '40px';
        snackbar.style.borderRadius = '24px';
        snackbar.style.boxShadow = '0 24px 60px rgba(15, 23, 42, 0.2)';
        snackbar.style.border = '1px solid #e5e7eb';
        snackbar.style.font = '500 20px Inter, system-ui, sans-serif';
        snackbar.style.width = 'min(96vw, 600px)';
        snackbar.style.maxWidth = '100%';
        snackbar.style.display = 'flex';
        snackbar.style.flexDirection = 'column';
        snackbar.style.gap = '24px';
        snackbar.style.opacity = '0';
        snackbar.style.transform = 'scale(0.95) translateY(16px)';
        snackbar.style.transition = 'all 300ms cubic-bezier(0.34, 1.56, 0.64, 1)';

        // Email Entry State
        const renderEmailState = () => {
          snackbar.innerHTML = '';
          snackbar.className = '';
          const header = document.createElement('div');
          header.style.display = 'flex';
          header.style.justifyContent = 'space-between';
          header.style.alignItems = 'center';
          
          const title = document.createElement('div');
          title.textContent = 'Continue with Email';
          title.style.fontWeight = '700';
          title.style.fontFamily = 'Poppins, sans-serif';
          title.style.fontSize = '26px';
          
          const closeBtn = document.createElement('button');
          closeBtn.innerHTML = '&times;';
          closeBtn.style.background = 'none';
          closeBtn.style.border = 'none';
          closeBtn.style.fontSize = '36px';
          closeBtn.style.lineHeight = '1';
          closeBtn.style.cursor = 'pointer';
          closeBtn.style.color = '#64748b';
          closeBtn.onclick = () => {
            snackbar.style.opacity = '0';
            snackbar.style.transform = 'scale(0.95) translateY(16px)';
            setTimeout(() => {
               snackbar.remove();
               host.remove();
            }, 250);
          };
          header.appendChild(title);
          header.appendChild(closeBtn);

          const input = document.createElement('input');
          input.type = 'email';
          input.placeholder = 'Enter your email address';
          input.style.width = '100%';
          input.style.padding = '18px';
          input.style.borderRadius = '14px';
          input.style.border = '2px solid #e5e7eb';
          input.style.fontSize = '20px';
          input.style.fontFamily = 'inherit';
          input.style.outline = 'none';
          input.style.transition = 'border-color 0.2s';
          
          input.onfocus = () => input.style.borderColor = '#0b4f8c';
          input.onblur = () => input.style.borderColor = '#e5e7eb';

          const sendOtpBtn = document.createElement('button');
          sendOtpBtn.textContent = 'Send 4-digit OTP';
          sendOtpBtn.style.background = '#0b4f8c';
          sendOtpBtn.style.color = '#fff';
          sendOtpBtn.style.border = 'none';
          sendOtpBtn.style.padding = '18px';
          sendOtpBtn.style.borderRadius = '14px';
          sendOtpBtn.style.font = '600 20px Poppins, sans-serif';
          sendOtpBtn.style.cursor = 'pointer';
          sendOtpBtn.style.transition = 'background 0.2s';

          const errorMessage = document.createElement('div');
          errorMessage.style.color = '#ef4444';
          errorMessage.style.fontSize = '15px';
          errorMessage.style.marginTop = '-12px';
          errorMessage.style.display = 'none';

          sendOtpBtn.onclick = async () => {
             const email = input.value.trim();
             if(email === '' || !email.includes('@')) {
               input.style.borderColor = '#ef4444';
               return;
             }
             input.style.borderColor = '#e5e7eb';
             errorMessage.style.display = 'none';
             sendOtpBtn.textContent = 'Sending...';
             sendOtpBtn.disabled = true;
             sendOtpBtn.style.opacity = '0.7';
             
             try {
               await safeFetchJson('/api/auth/email/send-otp', {
                 method: 'POST',
                 headers: { 'Content-Type': 'application/json' },
                 body: JSON.stringify({ email })
               });
               
               // Transition to Premium OTP View
               renderOtpState(email);
             } catch (err) {
               errorMessage.textContent = err.message;
               errorMessage.style.display = 'block';
               sendOtpBtn.textContent = 'Send 4-digit OTP';
               sendOtpBtn.disabled = false;
               sendOtpBtn.style.opacity = '1';
             }
          };

          snackbar.appendChild(header);
          snackbar.appendChild(input);
          snackbar.appendChild(errorMessage);
          snackbar.appendChild(sendOtpBtn);
        };

        const renderOtpState = (email) => {
          snackbar.classList.add('otp-modal');
          snackbar.innerHTML = `
            <div class="otp-header">
              <h2 class="otp-title">OTP Verification <span class="otp-v2"></span></h2>
              <p class="otp-subtitle">Let's verify your number</p>
            </div>
            
            <div class="otp-inputs-wrapper">
              <div class="otp-inputs">
                <input type="text" class="otp-box" maxlength="1" pattern="[0-9]*" inputmode="numeric" />
                <input type="text" class="otp-box" maxlength="1" pattern="[0-9]*" inputmode="numeric" />
                <input type="text" class="otp-box" maxlength="1" pattern="[0-9]*" inputmode="numeric" />
                <input type="text" class="otp-box" maxlength="1" pattern="[0-9]*" inputmode="numeric" />
              </div>
              <svg class="otp-check-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
              </svg>
            </div>
            
            <button class="otp-verify-btn" disabled>Verify</button>
            <div class="otp-resend">Resend OTP in <span class="otp-timer">30</span>s</div>
          `;

          const inputs = Array.from(snackbar.querySelectorAll('.otp-box'));
          const wrapper = snackbar.querySelector('.otp-inputs');
          const verifyBtn = snackbar.querySelector('.otp-verify-btn');
          const timerEl = snackbar.querySelector('.otp-timer');
          const resendWrap = snackbar.querySelector('.otp-resend');
          
          let timeLeft = 30;
          const timerInterval = setInterval(() => {
            timeLeft--;
            timerEl.textContent = timeLeft;
            if (timeLeft <= 0) {
              clearInterval(timerInterval);
              resendWrap.innerHTML = `Didn't receive it? <button id="resend-btn">Resend OTP</button>`;
              snackbar.querySelector('#resend-btn').onclick = async () => {
                const btn = snackbar.querySelector('#resend-btn');
                btn.disabled = true;
                btn.textContent = 'Sending...';
                try {
                  await safeFetchJson('/api/auth/email/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                  });
                  btn.textContent = 'Sent!';
                } catch (err) {
                  btn.textContent = err.message || 'Failed. Try again';
                  btn.disabled = false;
                  btn.style.color = '#ef4444'; // turn red on error to read clearly
                }
              };
            }
          }, 1000);

          const getOtp = () => inputs.map(i => i.value).join('');

          inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
              if (e.target.value.length > 1) e.target.value = e.target.value[0]; // Paste handle fallback
              if (e.target.value.match(/[0-9]/)) {
                input.classList.add('pop');
                setTimeout(() => input.classList.remove('pop'), 200);
                if (index < inputs.length - 1) inputs[index + 1].focus();
              } else {
                e.target.value = '';
              }
              verifyBtn.disabled = getOtp().length !== 4;
            });

            input.addEventListener('keydown', (e) => {
              if (e.key === 'Backspace' && !e.target.value && index > 0) {
                inputs[index - 1].focus();
                inputs[index - 1].value = '';
              }
              if (e.key === 'ArrowLeft' && index > 0) inputs[index - 1].focus();
              if (e.key === 'ArrowRight' && index < inputs.length - 1) inputs[index + 1].focus();
            });

            input.addEventListener('paste', (e) => {
              e.preventDefault();
              const pastedData = (e.clipboardData || window.clipboardData).getData('text').trim().replace(/\\D/g, '');
              if (pastedData) {
                for (let i = 0; i < inputs.length; i++) {
                  if (pastedData[i]) {
                    inputs[i].value = pastedData[i];
                    if (i === inputs.length - 1) inputs[i].focus();
                  }
                }
                verifyBtn.disabled = getOtp().length !== 4;
              }
            });
          });

          // Focus first input initially
          setTimeout(() => inputs[0].focus(), 100);

          verifyBtn.onclick = async () => {
            const otp = getOtp();
            if (otp.length !== 4) return;
            
            verifyBtn.textContent = 'Verifying...';
            verifyBtn.disabled = true;

            // Trigger collapse animation
            wrapper.classList.add('collapsing');

            try {
              await safeFetchJson('/api/auth/email/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, otp })
              });
              
              // Success Animation
              setTimeout(() => {
                wrapper.classList.add('success');
                setTimeout(() => {
                  window.location.href = 'registration.html';
                }, 1000);
              }, 400); // Wait for collapse to finish
              
            } catch (err) {
              // Failure Animation
              setTimeout(() => {
                wrapper.classList.remove('collapsing');
                wrapper.classList.add('failure');
                verifyBtn.textContent = err.message || 'Invalid OTP';
                verifyBtn.style.background = '#ef4444';
                verifyBtn.style.color = '#fff';
                verifyBtn.disabled = false;
                inputs.forEach(i => i.value = '');
                setTimeout(() => {
                  wrapper.classList.remove('failure');
                  inputs[0].focus();
                  setTimeout(() => {
                    verifyBtn.textContent = 'Verify';
                    verifyBtn.style.background = '#ff9d00';
                    verifyBtn.style.color = '#000';
                  }, 2500);
                }, 400);
              }, 400);
            }
          };
        };

        renderEmailState();
        host.appendChild(snackbar);

        requestAnimationFrame(() => {
          snackbar.style.opacity = '1';
          snackbar.style.transform = 'scale(1) translateY(0)';
        });
      };

      if (appleButton) {
        // ALWAYS display apple button so user can see it! 
        appleButton.hidden = false;
        appleButton.addEventListener('click', (event) => {
          event.preventDefault();
          showAppleSnackbar();
        });
      }

      if (anotherGoogleButton) {
        anotherGoogleButton.addEventListener('click', (event) => {
          event.preventDefault();
          showOtherAccountSnackbar();
        });
      }

      if (window.CareWellGoogleAuth && googleButton) {
        window.CareWellGoogleAuth.bindGoogleButton(googleButton, {
          onSuccess(profile) {
            window.location.href = 'registration.html';
          },
        });
      }
    });
  </script>
</body>
</html>
