<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apple Sign-In - CareWell</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F8FAFC;
      --surface: #FFFFFF;
      --primary: #000000;
      --border: #E2E8F0;
      --text: #0F172A;
      --muted: #64748B;
      --radius: 24px;
      --shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
      min-height: 100vh;
    }
    .card {
      width: 100%;
      max-width: 460px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 36px 32px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      text-align: center;
      animation: fadeIn 0.5s ease both;
    }
    .brand img {
      width: 160px;
      height: auto;
      margin: 0 auto;
      display: block;
    }
    h1 {
      margin: 0;
      font-family: Poppins, sans-serif;
      font-size: 28px;
      font-weight: 700;
      color: #0C1E43;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.6;
    }
    .accounts-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-align: left;
    }
    .account-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      border: 1px solid #E2E8F0;
      border-radius: 16px;
      background: transparent;
      width: 100%;
      cursor: pointer;
      transition: background-color 200ms ease, border-color 200ms ease;
    }
    .account-item:hover {
      background: #F8FAFC;
      border-color: var(--primary);
    }
    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 999px;
      background: var(--primary);
      color: #FFFFFF;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }
    .account-info {
      display: flex;
      flex-direction: column;
    }
    .account-info strong {
      font-size: 15px;
      color: #1E293B;
    }
    .account-info span {
      font-size: 13px;
      color: var(--muted);
    }
    .link {
      color: #0B4F8C;
      text-decoration: none;
      font-weight: 600;
      font-size: 16px;
      transition: color 200ms ease;
    }
    .link:hover {
      text-decoration: underline;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 520px) {
      .card { padding: 24px; }
    }
  </style>
</head>
<body>
  <article class="card" aria-label="Apple authentication page">
    <div class="brand"><img src="main_logo.jpg" alt="CareWell logo" /></div>
    <h1>Continue with Apple</h1>
    <p>Sign in using your Apple ID for secure, one-click access to CareWell.</p>
    
    <div class="accounts-list">
      <button class="account-item" onclick="selectAccount('Apple User', 'apple.user@icloud.com')">
        <span class="avatar"></span>
        <div class="account-info">
          <strong>Apple User</strong>
          <span>apple.user@icloud.com</span>
        </div>
      </button>
    </div>

    <a class="link" href="onboarding-screen-7.html">← Back to gateway</a>
  </article>

  <script>
    function selectAccount(name, email) {
      // Set session variables and mock login
      const mockToken = 'mock_jwt_token_' + Math.random().toString(36).substring(2, 15);
      sessionStorage.setItem('jwtToken', mockToken);
      sessionStorage.setItem('userProfile', JSON.stringify({ name, email, method: 'Apple' }));
      
      alert(`Logging in as ${email}`);
      window.location.href = 'question-flow.html';
    }
  </script>
</body>
</html>
