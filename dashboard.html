<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CareWell - Dashboard</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Inter,system-ui,sans-serif;background:#f8fafc;color:#0f172a}
    .card{background:#fff;border:1px solid #e5e7eb;border-radius:24px;box-shadow:0 10px 30px rgba(15,23,42,.08);padding:32px 28px;max-width:420px;text-align:center}
    h1{margin:0 0 8px;font-size:28px}
    p{margin:0;color:#64748b;line-height:1.6}
  </style>
</head>
<body>
  <main class="card">
    <h1>Dashboard</h1>
    <p>Registration complete. CareWell is ready for the next phase.</p>
  </main>
  <script src="registration-state.js" defer></script>
  <script>
    window.addEventListener('DOMContentLoaded', async () => {
      if (window.CareWellRegistration) {
        await window.CareWellRegistration.gateDashboard();
      }
    });
  </script>
</body>
</html>
